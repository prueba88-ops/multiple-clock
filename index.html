<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Geist Pixel font -->
  <link rel="stylesheet" href="https://vercel.app">

  <style>
    :root{
      --bg-clock: #9ED8DB;   /* default flip-card background */
      --text: #E9FFF9;       /* default text color */
      --cardLine: rgba(255,255,255,0.18);
      --border: rgba(255,255,255,0.22);
      --shadow: rgba(0,0,0,0.15);
    }

    body{
      background: transparent; /* 1. Fondo del widget totalmente transparente */
      color: var(--text);
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: "Geist Pixel", monospace;
    }

    body, .clock-container, .title, .date, .digit, .colon, select, .ampm {
      font-family: "Geist Pixel", monospace !important;
      color: var(--text);
      transition: color 250ms ease, border-color 250ms ease;
    }

    /* 3. Estructura compacta ideal para columnas de Notion */
    .clock-container{
      text-align: center;
      letter-spacing: 0.5px;
      width: 100%;
      max-width: 200px; /* Tamaño máximo cuadrado */
      padding: 10px;
      box-sizing: border-box;
    }

    .controls{
      display: flex;
      justify-content: center;
      margin-bottom: 8px;
    }

    select{
      background: rgba(0, 0, 0, 0.08);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 4px 6px;
      outline: none;
      font-size: 10px;
      cursor: pointer;
    }

    .title{
      font-size: 10px;
      font-weight: 600;
      margin-bottom: 8px;
      line-height: 1.2;
      word-wrap: break-word;
    }

    .flip-row{
      display: flex;
      gap: 4px;
      justify-content: center;
      align-items: center;
      margin-bottom: 6px;
      position: relative;
    }

    .flip-group{
      display: flex;
      gap: 3px;
      align-items: center;
    }

    /* 1. El color de fondo (bg) ahora se aplica solo a las tarjetas del reloj */
    .flip-card{
      width: 26px; 
      height: 36px;
      border-radius: 6px;
      background: var(--bg-clock);
      box-shadow: 0 4px 10px var(--shadow);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      transition: background-color 250ms ease;
    }

    .flip-card::after{
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      top: 50%;
      height: 1px;
      background: var(--cardLine);
    }

    .digit{
      font-size: 20px;
      font-weight: 800;
      line-height: 1;
      letter-spacing: 0.5px;
      font-variant-numeric: tabular-nums;
    }

    .colon{
      font-size: 18px;
      font-weight: 700;
      opacity: 0.8;
      transform: translateY(-1px);
    }

    /* 2. Estilo pequeño para el indicador AM/PM */
    .ampm{
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      margin-left: 2px;
      align-self: flex-end;
      padding-bottom: 4px;
      opacity: 0.9;
    }

    .date{
      font-size: 10px;
      opacity: 0.8;
    }
  </style>
</head>

<body>
  <div class="clock-container">
    <div class="controls">
      <select id="city-select" aria-label="Select city"></select>
    </div>

    <div class="title" id="title">Loading...</div>

    <div class="flip-row" aria-label="Selected time">
      <div class="flip-group" id="hh"></div>
      <div class="colon">:</div>
      <div class="flip-group" id="mm"></div>
      <!-- 2. Contenedor para AM/PM -->
      <div class="ampm" id="ampm">--</div>
    </div>

    <div class="date" id="clock-date">--------</div>
  </div>

  <script>
    const CITIES = [
      { id: "panama", label: "Panama", timeZone: "America/Panama", bg: "#9ED8DB", text: "#E9FFF9", phrase: "le digo hola, ella me dice goodbye" },
      { id: "bud", label: "Budapest", timeZone: "Europe/Budapest", bg: "#FBD1A2", text: "#FC9F5B", phrase: "all the partyy in Hungaryyy" },
      { id: "seoul", label: "Seoul", timeZone: "Asia/Seoul", bg: "#EC4067", text: "#F7C59F", phrase: "saranghae neol i neukkim idaero" },
      { id: "sv", label: "San Salvador", timeZone: "America/El_Salvador", bg: "#4A5899", text: "#C1DBE3", phrase: "el de ojitos dormilones" },
      { id: "paris", label: "Paris", timeZone: "Europe/Paris", bg: "#EFA48B", text: "#FCC8B2", phrase: "i wanna brainwash you into loving me forever" },
      { id: "london", label: "London", timeZone: "Europe/London", bg: "#C6D8AF", text: "#CAD2C5", phrase: "you’re insecure, don’t know what forrr" },
      { id: "la", label: "Los Angeles", timeZone: "America/Los_Angeles", bg: "#1CFEBA", text: "#95F2D9", phrase: "the lush life’s givin’ me a rushhh" },
      { id: "nyc", label: "New York", timeZone: "America/New_York", bg: "#B8CDF8", text: "#9D8DF1", phrase: "un verano en Nuevayol, un ratito na’ má’" }
    ];

    const citySelect = document.getElementById("city-select");
    const titleEl = document.getElementById("title");
    const dateEl = document.getElementById("clock-date");
    const ampmEl = document.getElementById("ampm");

    const hhEl = document.getElementById("hh");
    const mmEl = document.getElementById("mm");

    let selected = CITIES[0];

    function renderOptions(){
      citySelect.innerHTML = CITIES.map(c =>
        `<option value="${c.id}">${c.label}</option>`
      ).join("");
      citySelect.value = selected.id;
    }

    function applyTheme(city){
      // 1. Ahora modifica --bg-clock en lugar del fondo de la página
      document.documentElement.style.setProperty("--bg-clock", city.bg);
      document.documentElement.style.setProperty("--text", city.text);
      titleEl.textContent = city.phrase; 
    }

    function setTwoDigitCards(el, value2){
      const [a, b] = String(value2).padStart(2, "0").split("");
      el.innerHTML = `
        <div class="flip-card"><div class="digit">${a}</div></div>
        <div class="flip-card"><div class="digit">${b}</div></div>
      `;
    }

    function updateClock(){
      const now = new Date();
      const parts = new Intl.DateTimeFormat("en-US", {
        timeZone: selected.timeZone,
        hour: "2-digit",
        minute: "2-digit",
        hour12: true
      }).formatToParts(now);

      const get = (type) => parts.find(p => p.type === type)?.value ?? "00";

      // Limpieza de formato de hora para evitar bugs visuales
      let hourVal = get("hour");
      if(hourVal.length > 2) hourVal = hourVal.slice(-2);

      setTwoDigitCards(hhEl, hourVal);
      setTwoDigitCards(mmEl, get("minute"));
      
      // 2. Renderizado dinámico de AM o PM
      ampmEl.textContent = get("dayPeriod").toLowerCase();

      dateEl.textContent = new Intl.DateTimeFormat("en-US", {
        timeZone: selected.timeZone,
        weekday: "short", /* Formato más corto para que quepa en el cuadro */
        month: "short",
        day: "numeric"
      }).format(now);
    }

    citySelect.addEventListener("change", () => {
      selected = CITIES.find(c => c.id === citySelect.value) ?? CITIES[0];
      applyTheme(selected);
      updateClock();
    });

    renderOptions();
    applyTheme(selected);
    updateClock();
    setInterval(updateClock, 1000);
  </script>
</body>
</html>
