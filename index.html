<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Geist Pixel font -->
  <link rel="stylesheet" href="https://vercel.app">

  <style>
    :root{
      --bg-clock: #E9FFF9;   /* default Panama */
      --text: #9ED8DB;       /* default Panama */
      --cardLine: rgba(255,255,255,0.15);
      --shadow: rgba(0,0,0,0.12);
    }

    body{
      background: transparent; 
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: "Geist Pixel", monospace;
    }

    body, .clock-container, .date, .digit, .ampm {
      font-family: "Geist Pixel", monospace !important;
      transition: color 250ms ease;
      user-select: none;
    }

    /* Ancho ultra reducido gracias a la orientación vertical */
    .clock-container{
      text-align: center;
      letter-spacing: 0.5px;
      width: 100%;
      max-width: 110px; 
      padding: 4px;
      box-sizing: border-box;
      cursor: pointer;
    }

    /* Contenedor vertical para apilar hora y minutos */
    .vertical-clock {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      margin-bottom: 6px;
    }

    /* Fila de minutos con espacio para el AM/PM al lado */
    .row-with-ampm {
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .flip-group{
      display: flex;
      gap: 1px;
      align-items: center;
    }

    .flip-card{
      width: 35px; 
      height: 48px;
      border-radius: 5px;
      background: var(--bg-clock);
      box-shadow: 0 3px 8px var(--shadow);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      transition: background-color 250ms ease;
    }

    .flip-card::after{
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      top: 50%;
      height: 1px;
      background: var(--cardLine);
    }

    .digit{
      font-size: 28px;
      font-weight: 800;
      line-height: 1;
      letter-spacing: 0.5px;
      font-variant-numeric: tabular-nums;
    }

    /* Ubicado estéticamente al lado de los minutos */
    .ampm{
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      margin-left: 4px;
      align-self: flex-end;
      padding-bottom: 4px;
      opacity: 0.9;
    }

    .date{
      font-size: 11px;
      opacity: 0.9;
      margin-top: 2px;
      font-weight: 600;
    }
  </style>
</head>

<body>
  <div class="clock-container" id="clock-trigger" aria-label="Click to switch city">
    <!-- Estructura vertical: Hora arriba, Minutos abajo -->
    <div class="vertical-clock">
      <!-- Arriba: Horas -->
      <div class="flip-group" id="hh"></div>
      
      <!-- Abajo: Minutos + AM/PM -->
      <div class="row-with-ampm">
        <div class="flip-group" id="mm"></div>
        <div class="ampm" id="ampm">--</div>
      </div>
    </div>

    <div class="date" id="clock-date">--------</div>
  </div>

  <script>
    const CITIES = [
      { id: "panama", label: "Panama", timeZone: "America/Panama", bg: "#E9FFF9", text: "#9ED8DB" },
      { id: "bud", label: "Budapest", timeZone: "Europe/Budapest", bg: "#FBD1A2", text: "#FC9F5B" }
    ];

    const containerEl = document.getElementById("clock-trigger");
    const dateEl = document.getElementById("clock-date");
    const ampmEl = document.getElementById("ampm");
    const hhEl = document.getElementById("hh");
    const mmEl = document.getElementById("mm");

    let currentIndex = 0;
    let selected = CITIES[currentIndex];

    function applyTheme(city){
      document.documentElement.style.setProperty("--bg-clock", city.bg);
      document.documentElement.style.setProperty("--text", city.text);
      dateEl.style.color = city.text;
      ampmEl.style.color = city.text;
    }

    function setTwoDigitCards(el, value2){
      const [a, b] = String(value2).padStart(2, "0").split("");
      el.innerHTML = `
        <div class="flip-card"><div class="digit" style="color: var(--text);">${a}</div></div>
        <div class="flip-card"><div class="digit" style="color: var(--text);">${b}</div></div>
      `;
    }

    function updateClock(){
      const now = new Date();
      const parts = new Intl.DateTimeFormat("en-US", {
        timeZone: selected.timeZone,
        hour: "2-digit",
        minute: "2-digit",
        hour12: true
      }).formatToParts(now);

      const get = (type) => parts.find(p => p.type === type)?.value ?? "00";

      let hourVal = get("hour");
      if(hourVal.length > 2) hourVal = hourVal.slice(-2);

      setTwoDigitCards(hhEl, hourVal);
      setTwoDigitCards(mmEl, get("minute"));
      
      ampmEl.textContent = get("dayPeriod").toLowerCase();

      dateEl.textContent = new Intl.DateTimeFormat("en-US", {
        timeZone: selected.timeZone,
        weekday: "short", 
        month: "short",
        day: "numeric"
      }).format(now);
    }

    containerEl.addEventListener("click", () => {
      currentIndex = currentIndex === 0 ? 1 : 0;
      selected = CITIES[currentIndex];
      applyTheme(selected);
      updateClock();
    });

    // Inicialización
    applyTheme(selected);
    updateClock();
    setInterval(updateClock, 1000);
  </script>
</body>
</html>
